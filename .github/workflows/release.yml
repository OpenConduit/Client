name: Release

on:
  release:
    types: [published]

permissions:
  contents: write  # needed to create GitHub Releases

jobs:
  build-mac:
    name: Build macOS (Apple Silicon)
    runs-on: macos-15
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@openconduit'

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build macOS arm64
        run: npm run make -- --platform darwin --arch arm64
        env:
          # Code signing (optional)
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # CSC_LINK: ${{ secrets.CSC_LINK }}
          # CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          NODE_ENV: production

      - uses: actions/upload-artifact@v4
        with:
          name: openconduit-mac-arm64-${{ github.ref_name }}
          path: packages/desktop/out/make/**/*.dmg
          retention-days: 30

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@openconduit'

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows distributable
        run: npm run make -- --platform win32
        env:
          NODE_ENV: production

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openconduit-win-${{ github.ref_name }}
          path: packages/desktop/out/make/**/*.exe
          retention-days: 30

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest
    permissions:
      packages: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          registry-url: 'https://npm.pkg.github.com'
          scope: '@openconduit'

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install Linux packaging deps
        run: sudo apt-get install -y rpm

      - name: Build Linux distributable
        run: npm run make -- --platform linux
        env:
          NODE_ENV: production

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openconduit-linux-${{ github.ref_name }}
          path: |
            packages/desktop/out/make/**/*.deb
            packages/desktop/out/make/**/*.rpm
          retention-days: 30

  release:
    name: Create GitHub Release
    needs: [build-mac, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Detect pre-release
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" == *"-"* ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
          prerelease: ${{ steps.prerelease.outputs.is_prerelease == 'true' }}
          draft: ${{ steps.prerelease.outputs.is_prerelease == 'false' }}  # Drafts for stable only

      - name: Trigger website redeploy
        if: steps.prerelease.outputs.is_prerelease == 'false'
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.WEBSITE_DISPATCH_TOKEN }}
          repository: OpenConduit/Website
          event-type: client-released
